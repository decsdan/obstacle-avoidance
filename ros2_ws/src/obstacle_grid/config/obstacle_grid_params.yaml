obstacle_grid_node:
  ros__parameters:
    # Grid dimensions (overridden by SLAM map if use_slam_dimensions=True)
    grid_width: 200
    grid_height: 200
    grid_resolution: 0.05
    grid_origin_x: -5.0
    grid_origin_y: -5.0
    use_slam_dimensions: true

    # LIDAR processing
    max_lidar_range: 8.0
    min_lidar_range: 0.05
    lidar_downsample: 2

    # Inflation (total = robot_radius + safety_clearance)
    robot_radius: 0.22
    safety_clearance: 0.05

    # Publishing rate (Hz)
    publish_rate: 10.0

    # Log-odds inverse sensor model
    l_free: -0.4
    l_occ: 0.85
    l_clamp: 5.0
    sensor_noise_sigma: 0.02
    decay_tau_seconds: 30.0
    occ_threshold_log_odds: 0.4
